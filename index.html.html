<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茂順企業 - 新進員工職涯導航系統 v2.0</title>
    <style>
        :root {
            --primary: #1e3d59;
            --accent: #17b978;
            --secondary: #ff6f61;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e2ebf0 100%);
        }
        
        body { 
            font-family: 'Microsoft JhengHei', Arial, sans-serif; 
            background: var(--bg-gradient);
            color: #333; 
            margin: 0; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 750px; 
            width: 100%;
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 28px; margin-bottom: 10px; }
        .subtitle { color: #777; margin-bottom: 30px; font-size: 16px; }

        /* 表單輸入區 */
        .input-group { background: #f8fafc; padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; text-align: left; }
        .form-row { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input[type="text"]:focus, select:focus { border-color: var(--primary); }

        /* 按鈕樣式 */
        button { padding: 12px 30px; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin: 10px 5px; }
        .btn-step1 { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-step1:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30,61,89,0.3); }
        .btn-step2 { background: var(--accent); color: white; display: none; }
        .btn-step2:hover { transform: scale(1.05); }
        .btn-feedback { background: #e2e8f0; color: #4a5568; font-size: 14px; padding: 8px 20px; }
        .btn-feedback:hover { background: #cbd5e1; }

        /* 動態效果 */
        .fade-in-up { animation: fadeInUp 0.6s ease forwards; display: none; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 結果顯示區 */
        .result-box { margin-top: 30px; padding: 25px; background: #f0f7f4; border-radius: 15px; text-align: left; }
        .ability-detail { background: white; padding: 20px; border-radius: 8px; margin-top: 10px; box-shadow: inset 4px 0 0 var(--accent); border: 1px solid #e2e8f0; }
        .feedback-status { color: var(--accent); font-weight: bold; margin-top: 10px; display: none; text-align: center; }

        /* 夥伴推薦卡片 */
        .partner-card { margin-top: 25px; padding: 30px; background: var(--primary); color: white; border-radius: 15px; position: relative; text-align: left; box-shadow: 0 10px 25px rgba(30,61,89,0.2); }
        .match-badge { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; color: #fff; border: 1px solid rgba(255,255,255,0.4); }
        .partner-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .partner-job { color: var(--accent); font-weight: bold; font-size: 14px; }
        .motto { font-style: italic; color: #cbd5e1; margin: 15px 0; border-left: 3px solid var(--accent); padding-left: 15px; line-height: 1.5; }

        #loader { display: none; margin: 20px 0; font-weight: bold; color: var(--primary); font-size: 16px; }
        .dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🧬 茂順企業 - 新進員工職涯導航</h1>
    <p class="subtitle">歡迎加入茂順！請填寫基本資料，解鎖你的職場原力，並隨機配對最適合或互補的學長姐夥伴！</p>
    
    <div class="input-group">
        <div class="form-row">
            <label for="userName">1. 請輸入你的姓名/暱稱：</label>
            <input type="text" id="userName" placeholder="例如：王小明">
        </div>
        <div class="form-row">
            <label for="userInterest">2. 請輸入你的興趣愛好（會與學長姐連動唷）：</label>
            <input type="text" id="userInterest" placeholder="例如：打羽球、看電影、品嚐美食">
        </div>
        <div class="form-row">
            <label for="mbtiSelect">3. 請選擇你的 MBTI 人格類型：</label>
            <select id="mbtiSelect"></select>
        </div>
        <button class="btn-step1" onclick="analyzeStep1()">第一步：解鎖我的詳細強項</button>
    </div>

    <div id="resultBox" class="fade-in-up">
        <div class="result-box">
            <h3 style="margin-top:0; color: var(--primary);">✨ <span id="userNameSpan"></span> 的職場核心特質：<span id="resTitle"></span></h3>
            <div class="ability-detail">
                <strong>🔍 深度專業能力分析：</strong>
                <p id="resAbility" style="margin: 8px 0 0 0; line-height: 1.7; color:#4a5568;"></p>
            </div>
            <p style="margin-top: 15px;"><strong>🎨 登記的個人興趣：</strong> <span id="resInterest" style="color:#2d3748; font-weight: bold;"></span></p>
            
            <div style="margin-top: 25px; border-top: 1px solid #e2e8f0; padding-top: 20px; text-align: center;">
                <span style="font-size: 14px; color:#666; margin-right: 10px;">這份強項分析準確嗎？</span>
                <button class="btn-feedback" onclick="sendFeedback('超準！完全就是我')">🎯 超準！完全就是我</button>
                <button class="btn-feedback" onclick="sendFeedback('還好，有一半符合')">🤔 還好，有一半符合</button>
                <div id="feedbackStatus" class="feedback-status">感謝您的即時回饋！本數據已匿名納入人資處系統優化。</div>
            </div>
        </div>
        <center><button id="btnFindPartner" class="btn-step2" onclick="startMatching()">第二步：隨機媒合我的茂順夥伴</button></center>
    </div>

    <div id="loader">🧠 正在從 32 位茂順菁英中尋找靈魂共鳴<span class="dot">...</span></div>

    <div id="partnerBox" class="fade-in-up">
        <div class="partner-card">
            <div class="match-badge" id="matchBadge"></div>
            <div class="partner-job" id="partnerJob"></div>
            <div class="partner-name" id="partnerName"></div>
            <div class="motto" id="partnerMotto"></div>
            <p style="line-height: 1.6;"><strong>💬 學長姐悄悄話：</strong><br><span id="partnerVoice" style="color: #f8fafc;"></span></p>
            <p style="font-size: 14px; color: var(--accent); margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">🔥 推薦理由：<span id="partnerReason" style="color:white; font-weight: normal;"></span></p>
        </div>
    </div>
</div>

<script>
// 擴充為 32 位學長姐資料庫（每種 MBTI 均有「適合類型」與「互補類型」）
const mbtiDatabase = {
    "INTJ": { title: "INTJ (戰略大師)",

        partners: [

            { name: "莉娜 Lina", job: "全球業務部 資深商務談判官", target: "互補配對 ➔ ENFP", motto: "「邏輯能帶你從 A 到 B，但熱情能帶你到任何地方。」", voice: "哈囉 {name}！聽說你對{interest}很拿手？你那縝密的腦袋配上我開拓市場的衝勁，絕對是完美的黃金戰隊，我會帶你體驗前線的刺激！", reason: "外向熱情的 Lina 能補足你的社交盲區，將你完美的戰略計劃成功推銷出去。" }

    "INTP": { title: "INTP (邏輯學家)", 
        ability: "【核心技術研發與底層邏輯排查】天生的問題解決者。對新技術、新工具具有極高的敏銳度，擅長進行底層代碼的疑難排解（Troubleshooting）。能夠將企業內繁瑣的手工流程，透過撰寫自動化腳本或工具徹底解放，是研發團隊的秘密武器。", 
        partners: [

            { name: "強森 Johnson", job: "福委會 執行秘書", target: "互補配對 ➔ ESFJ", motto: "「技術重要，但技術背後的人更重要。」", voice: "嘿 {name}！聽人資說你平常喜歡{interest}？研發之餘別忘了來參加活動放鬆一下。技術交給你，團隊的人際與後勤交給我來罩！", reason: "熱心體貼的 Johnson 能幫你處理好複雜的職場人際，讓你無後顧之憂地專注研發。" }

    "INFJ": { title: "INFJ (心靈導師)", 
        ability: "【組織願景建立與深層動機洞察】深刻的傾聽者與思想家。能精準捕捉團隊成員或客戶隱藏在言語背後的真實情感與需求。在企業文化建設、員工關係維護、以及長期品牌價值定位上，能提供極具深度且具備高度人文關懷的見解。",

function analyzeStep1() {
    const name = document.getElementById("userName").value.trim() || "新進同仁";
    const interest = document.getElementById("userInterest").value.trim() || "探索新事物";
    const selected = document.getElementById("mbtiSelect").value;
    const data = mbtiDatabase[selected];
    
    // 渲染資料
    document.getElementById("userNameSpan").innerText = name;
    document.getElementById("resTitle").innerText = data.title;
    document.getElementById("resAbility").innerText = data.ability;
    document.getElementById("resInterest").innerText = interest;
    
    // 初始化狀態
    document.getElementById("partnerBox").style.display = "none";
    document.getElementById("feedbackStatus").style.display = "none";
    document.getElementById("btnFindPartner").style.display = "inline-block";
    
    const box = document.getElementById("resultBox");
    box.style.display = "block";
    box.scrollIntoView({ behavior: 'smooth' });
}

function startMatching() {
    document.getElementById("btnFindPartner").style.display = "none";
    document.getElementById("loader").style.display = "block";
    
    // 延遲 1.2 秒展現媒合儀式感
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        showRandomPartner();
    }, 1200);
}

function showRandomPartner() {
    const name = document.getElementById("userName").value.trim() || "新進同仁";
    const interest = document.getElementById("userInterest").value.trim() || "探索新事物";
    const selected = document.getElementById("mbtiSelect").value;
    
    // 從該 MBTI 的適合與互補中「隨機抽選 1 位」(32個配對池的隨機機制)
    const partnerList = mbtiDatabase[selected].partners;
    const randomIndex = Math.floor(Math.random() * partnerList.length);
    const chosenPartner = partnerList[randomIndex];
    
    // 將名字與客製化興趣帶入對話字串中
    let customizedVoice = chosenPartner.voice.replace(/{name}/g, name).replace(/{interest}/g, interest);
    
    // 填入卡片
    document.getElementById("matchBadge").innerText = chosenPartner.target;
    document.getElementById("partnerJob").innerText = chosenPartner.job;
    document.getElementById("partnerName").innerText = chosenPartner.name;
    document.getElementById("partnerMotto").innerText = chosenPartner.motto;
    document.getElementById("partnerVoice").innerText = customizedVoice;
    document.getElementById("partnerReason").innerText = chosenPartner.reason;
    
    const box = document.getElementById("partnerBox");
    box.style.display = "block";
    box.scrollIntoView({ behavior: 'smooth' });
}

// 動態初始化 16 種選單
const selectEl = document.getElementById("mbtiSelect");
Object.keys(mbtiDatabase).sort().forEach(mbti => {
    let option = document.createElement("option");
    option.value = mbti;
    option.textContent = mbti;
    selectEl.appendChild(option);
});

function sendFeedback(type) {
    const statusEl = document.getElementById("feedbackStatus");
    statusEl.innerText = `已送出回饋：[${type}]！感謝您協助優化茂順新人資料庫。`;
    statusEl.style.display = "block";
}
